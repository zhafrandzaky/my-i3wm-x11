include-file = ~/.local/state/i3wm-x11/themes/current/colors.ini

[bar/main]
width = 98%
height = 24pt
radius = 0
offset-x = 1%
offset-y = 8px
fixed-center = true
bottom = false
override-redirect = true

background = #00000000
foreground = ${colors.foreground}

line-size = 0
border-size = 0
padding-left = 0
padding-right = 0
module-margin = 0

font-0 = "JetBrainsMono Nerd Font:style=Bold:size=10;2"
font-1 = "Symbols Nerd Font Mono:size=14;3"
font-2 = "JetBrainsMono Nerd Font:style=Regular:size=23;6"

; Module lists are composed by launch.sh from detected hardware (network,
; backlight, battery). The values below are the full-featured fallbacks.
modules-left = ${env:POLYBAR_MODULES_LEFT:ld distro sep caffeine sep traffic sep xworkspaces rd}
modules-center = ld dashboard date sep weather rd
modules-right = ${env:POLYBAR_MODULES_RIGHT:ld updates sep cpu memory pulseaudio backlight battery sep systray sep powermenu rd}

cursor-click = pointer
enable-ipc = true
wm-restack = i3

[module/ld]
type = custom/text
format = <label>
format-background = #00000000
format-foreground = #000000
label = "%{T3}%{T-}"

[module/rd]
type = custom/text
format = <label>
format-background = #00000000
format-foreground = #000000
label = "%{T3}%{T-}"

[module/sep]
type = custom/text
format = <label>
format-background = #000000
label = "|"
label-foreground = #555555
label-padding = 1

[module/distro]
type = custom/script
exec = ~/.config/i3/scripts/distro_icon.sh
interval = 3600
format = <label>
format-background = #000000
label = "%output%"
label-foreground = ${colors.primary}
click-left = ~/.config/i3/scripts/rofi_launcher.sh &

[module/updates]
type = custom/script
exec = ~/.config/i3/scripts/updates.sh
interval = 60
format = <label>
format-background = #000000
label = " %output% "
label-foreground = ${colors.secondary}
enable-click = true
click-left = ~/.config/i3/scripts/updates.sh show &
click-right = ~/.config/i3/scripts/updates.sh update &

[module/caffeine]
type = custom/script
exec = ~/.config/i3/scripts/caffeine.sh
interval = 1
format = <label>
format-background = #000000
format-padding = 0
label = " %output%"
label-foreground = ${colors.foreground}
click-left = ~/.config/i3/scripts/caffeine.sh toggle &

[module/traffic]
type = internal/network
; Detected by launch.sh; falls back to wlan0 if detection fails
interface = ${env:POLYBAR_IFACE:wlan0}
interval = 1.0
format-connected = <label-connected>
format-connected-background = #000000
label-connected = "  %upspeed%  %downspeed% "
label-connected-foreground = ${colors.disabled}
format-disconnected = "Disconnected"
format-disconnected-background = #000000
format-disconnected-foreground = #555555

[module/xworkspaces]
type = internal/xworkspaces
format-background = #000000
format-padding = 0
icon-0 = 1;
icon-1 = 2;
icon-2 = 3;
icon-3 = 4;
icon-4 = 5;
icon-default = "  "
label-active = "  "
label-active-foreground = ${colors.primary}
label-active-padding = 0
label-occupied = "  "
label-occupied-foreground = ${colors.disabled}
label-occupied-padding = 0
label-empty = "  "
label-empty-foreground = #313244
label-empty-padding = 0
enable-click = true
enable-scroll = true

[module/dashboard]
type = custom/text
format = <label>
format-background = #000000
format-padding = 0
label = " 󰍜 "
label-foreground = ${colors.foreground}
click-left = ~/.config/i3/scripts/rofi_dashboard.sh &

[module/date]
type = internal/date
interval = 1
format-background = #000000
date = %H:%M
date-alt = %A, %d %B %Y
format = <label>
format-prefix-foreground = ${colors.disabled}
label = " %date% "
label-foreground = ${colors.foreground}
enable-click = true

[module/cpu]
type = internal/cpu
interval = 1
format-background = #000000
format-prefix = "  "
format-prefix-foreground = ${colors.disabled}
label = "%percentage:2%% "

[module/memory]
type = internal/memory
interval = 1
format-background = #000000
format-prefix = " 󰘚 "
format-prefix-foreground = ${colors.disabled}
label = "%percentage_used:2%% "

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
format-volume-background = #000000
format-volume-prefix = "  "
format-volume-prefix-foreground = ${colors.disabled}
label-volume = "%percentage%% "
format-muted-background = #000000
format-muted-prefix = " 󰝟 "
format-muted-prefix-foreground = ${colors.alert}
label-muted = "Muted "
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol &

[module/battery]
type = custom/script
exec = ~/.config/i3/scripts/battery.sh
interval = 1
format = <label>
format-background = #000000
label = " %output% "
label-foreground = ${colors.foreground}
click-right = xfce4-power-manager-settings &

[module/backlight]
type = internal/backlight
; Detected by launch.sh; falls back to intel_backlight if detection fails
card = ${env:POLYBAR_BACKLIGHT:intel_backlight}
use-ui-max = true
enable-scroll = true
format-background = #000000
format = <ramp><label>
label = "%percentage%% "
ramp-0 = " 󰃞 "
ramp-1 = " 󰃝 "
ramp-2 = " 󰃟 "
ramp-3 = " 󰃠 "
ramp-foreground = ${colors.disabled}

[module/systray]
type = internal/tray
format-background = #000000
tray-background = #000000
format-margin = 0pt
format-padding = 4px
tray-spacing = 8pt
tray-size = 50%

[module/powermenu]
type = custom/text
format-background = #000000
label = "  "
label-foreground = ${colors.alert}
click-left = ~/.config/i3/scripts/rofi_powermenu.sh &

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/weather]
type = custom/script
exec = ~/.config/i3/scripts/weather.sh
interval = 60
format = <label>
format-background = #000000
label = "%output% "
label-foreground = ${colors.foreground}
click-left = ~/.config/i3/scripts/weather_preview.sh &
click-right = ~/.config/i3/scripts/weather_city_prompt.sh &